services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-demi_results}
      POSTGRES_USER: ${POSTGRES_USER:-demi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demi} -d ${POSTGRES_DB:-demi_results}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO --concurrency=2

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=INFO

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_API_URL: http://backend:8000
      BACKEND_ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/backend}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "3000:3000"

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-demi}
      PGPASSWORD: ${POSTGRES_PASSWORD:-change-me}
      PGDATABASE: ${POSTGRES_DB:-demi_results}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ./backups:/backups
    # Dump every 24h, gzip, delete files older than BACKUP_KEEP_DAYS
    command: >
      sh -c 'while true; do
        ts=$$(date +%Y-%m-%d_%H-%M);
        pg_dump -Fc -f /backups/demi_$$ts.dump && echo "backup done: demi_$$ts.dump";
        find /backups -name "demi_*.dump" -mtime +$$BACKUP_KEEP_DAYS -delete;
        sleep 86400;
      done'

volumes:
  postgres_data:
  redis_data:
